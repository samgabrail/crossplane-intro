---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: Instance
metadata:
  name: tekanaid-sample-instance
spec:
  forProvider:
    region: us-east-1
    ami: ami-0557a15b87f6559cf
    instanceType: t2.micro
    keyName: my-crossplane-key-pair
    vpcSecurityGroupIdSelector:
      matchLabels:
        selector: my-security-group
    tags:
      type: upbound-test-instance
      Name: tekanaid-sample-instance
  providerConfigRef:
    name: awsconfig
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: KeyPair
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: Requires a valid public key.
  name: my-crossplane-key-pair
spec:
  forProvider:
    publicKey: ssh-rsa  sam@SamMac.local
    region: us-east-1
  providerConfigRef:
    name: awsconfig
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: SecurityGroup
metadata:
  labels:
    upjet.upbound.io/test-group: apigatewayv2-vpclink
    selector: my-security-group
  name: allow-ssh-example
spec:
  forProvider:
    description: Allow TLS inbound traffic
    name: allow_ssh
    region: us-east-1
    tags:
      Name: allow_ssh
  providerConfigRef:
    name: awsconfig
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: SecurityGroupRule
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/securitygrouprule
  name: test-vpc-securitygroup-ingress
spec:
  deletionPolicy: Delete
  forProvider:
    cidrBlocks:
      - 0.0.0.0/0
    fromPort: 22
    protocol: tcp
    region: us-east-1
    securityGroupIdSelector:
      matchLabels:
        selector: my-security-group
    toPort: 22
    type: ingress
  providerConfigRef:
    name: awsconfig
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: SecurityGroupRule
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/securitygrouprule
  name: test-vpc-securitygroup-egress
spec:
  deletionPolicy: Delete
  forProvider:
    cidrBlocks:
      - 0.0.0.0/0
    fromPort: 0
    protocol: all
    region: us-east-1
    securityGroupIdSelector:
      matchLabels:
        selector: my-security-group
    toPort: 65536
    type: egress
  providerConfigRef:
    name: awsconfig